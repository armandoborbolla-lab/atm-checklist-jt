function parseDate(s) {
  const [datePart, timePart] = s.split(' ');
  const [d, m, y] = datePart.split('/');
  const [h, min, sec] = timePart.split(':');
  return new Date(+y, +m - 1, +d, +h, +min, +sec);
}

function mapCheck(v) {
  if (v === 'Cumple') return 'cumple';
  if (v === 'No cumple') return 'no_cumple';
  return null;
}

function mapCmt(v) {
  const t = (v || '').trim();
  if (!t || t === '.' || t === ':=' || t === '-') return null;
  return t;
}

function inferTipo(row) {
  const amCmt = (row[33] || '').toLowerCase();
  if (amCmt.includes('suite')) return 'suite';
  if (amCmt.includes('plus') || amCmt.includes('sencilla')) {
    return amCmt.includes('sencilla') ? 'sencilla' : 'plus';
  }
  // Check all comment fields
  const allText = [row[7],row[17],row[26],row[33],row[41],row[44]].join(' ').toLowerCase();
  if (/\bsuite\b/.test(allText)) return 'suite';
  if (/\bplus\b/.test(allText)) return 'plus';
  if (/\bsencilla\b/.test(allText)) return 'sencilla';
  // Infer from burbujas/preservativo
  if (row[30] === 'Cumple') return 'suite';
  if (row[31] === 'Cumple') return 'plus';
  return 'sencilla';
}

function rowToDoc(row) {
  const doc = {};
  doc.created_at = firebase.firestore.Timestamp.fromDate(parseDate(row[0]));
  doc.supervisor = row[1];
  doc.habitacion = row[2];
  doc.tipo_habitacion = inferTipo(row);

  CHECK_COLS.forEach(i => {
    doc[FIELDS[i + 1]] = mapCheck(row[i]); // offset +1 because FIELDS[0]=created_at
  });
  CMT_COLS.forEach(i => {
    doc[FIELDS[i + 1]] = mapCmt(row[i]);
  });
  doc.resultado = row[45];
  return doc;
}

  doc.habitacion  = row[2];
  doc.tipo_habitacion = inferTipo(row);

  CHECK_COLS.forEach(i => { doc[FIELD_MAP[i]] = mapCheck(row[i]); });
  CMT_COLS.forEach(i  => { doc[FIELD_MAP[i]] = mapCmt(row[i]); });
  doc.resultado = row[45];
  return doc;
}

function log(msg, cls) {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function startImport() {
  const btn = document.getElementById('btn');
  const prog = document.getElementById('prog');
  btn.disabled = true;
  prog.style.display = 'block';
  document.getElementById('log').innerHTML = '';
  log('Iniciando importación de ' + RAW.length + ' registros...');

  let ok = 0, fail = 0;
  for (let i = 0; i < RAW.length; i++) {
    try {
      const doc = rowToDocFixed(RAW[i]);
      await db.collection('revisiones').add(doc);
      ok++;
      log(`✓ [${i+1}/${RAW.length}] ${RAW[i][0]} — ${RAW[i][1]} — Hab ${RAW[i][2]}`, 'ok');
    } catch (e) {
      fail++;
      log(`✗ [${i+1}] Error: ${e.message}`, 'err');
    }
    prog.value = i + 1;
  }
  log(`\nCompletado: ${ok} importados, ${fail} errores.`, ok === RAW.length ? 'ok' : 'err');
  btn.textContent = 'Importación completa';
}
</script>
